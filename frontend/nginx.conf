# WebSocket : bascule l'en-tête Connection selon Upgrade (Grafana Live).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Protocole d'origine : honore X-Forwarded-Proto de Cloudflare (https),
# sinon le schéma réel (http en accès direct par IP).
map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Exports de caisse / factures jusqu'à ~25 Mo.
    client_max_body_size 25m;

    # Grafana : proxifié sous le même domaine (/grafana/), servi en
    # sous-chemin par Grafana lui-même (GF_SERVER_SERVE_FROM_SUB_PATH).
    # Pas de slash final sur proxy_pass : on conserve le préfixe /grafana/.
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        # WebSocket (Grafana Live / temps réel).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # API : proxifiée vers le backend (même origine -> pas de CORS).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Les appels IA (lecture de factures, copilote) peuvent dépasser 1 min :
        # sans ça, nginx coupe à 60 s (504).
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Assets au nom haché (immuables) : cache long, sûr.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html (et le reste) : JAMAIS mis en cache — évite l'écran blanc
    # après un déploiement (vieux index.html pointant vers un JS supprimé).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
