services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boucherie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boucherie}
      POSTGRES_DB: ${POSTGRES_DB:-boucherie}
      # Mot de passe de l'utilisateur lecture seule créé pour Grafana
      # (utilisé par le script d'init sur une base vierge).
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-grafana_ro}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boucherie}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-boucherie}:${POSTGRES_PASSWORD:-boucherie}@db:5432/${POSTGRES_DB:-boucherie}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      # Copilote IA : clé Claude + connexion Postgres LECTURE SEULE (grafana_ro)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COPILOT_MODEL: ${COPILOT_MODEL:-claude-opus-4-8}
      COPILOT_DATABASE_URL: postgresql+psycopg://grafana_ro:${GRAFANA_DB_PASSWORD:-grafana_ro}@db:5432/${POSTGRES_DB:-boucherie}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

  # Grafana : exploration libre des données (SQL ad hoc, dashboards
  # perso) sans toucher au code. Branché en LECTURE SEULE sur Postgres.
  grafana:
    image: grafana/grafana:11.3.1
    depends_on:
      - db
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Servi derrière le nginx du front, sous le sous-chemin /grafana/
      # (même origine -> un seul hostname pour Cloudflare, pas de port 3000).
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Autorise l'intégration en iframe dans l'app (même origine).
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Lecture anonyme (rôle Viewer) : les tableaux s'affichent dans l'app
      # sans double authentification. La base est déjà en lecture seule
      # (grafana_ro). L'admin garde son login pour éditer/sauvegarder.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_VIEWERS_CAN_EDIT: "true"
      # Interpolé dans la datasource provisionnée.
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-grafana_ro}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    # Plus de port 3000 exposé : Grafana passe par https://<domaine>/grafana/.
    restart: unless-stopped

volumes:
  pgdata:
  grafana-data:
